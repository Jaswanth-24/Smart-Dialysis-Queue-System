spring.application.name=dialysis-backend

spring.datasource.url=jdbc:h2:file:./data/dialysisdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true


# Flyway disabled ? schema managed by Hibernate ddl-auto=create-drop
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


#spring.data.redis.host=${REDIS_HOST:localhost}
#spring.data.redis.port=${REDIS_PORT:6379}
#spring.data.redis.password=${REDIS_PASSWORD:}

spring.websocket.allowed-origins=*

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000
jwt.patient-expiration-ms=604800000
spring.jpa.defer-datasource-initialization=true
app.consultation.trigger-every-n-sessions=10

app.queue.emergency-priority-score=1000
app.queue.max-wait-minutes-weight=0.5
app.queue.age-weight=0.3

app.machine.cleaning-minutes=1
scheduler-interval-ms=10000

logging.level.com.dialysis=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=INFO